x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=96MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=20
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo}
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  api:
    image: ${API_IMAGE:-ghcr.io/ogsupra/todo_list-api:latest}
    build:
      context: ./backend
    container_name: todo_api
    restart: unless-stopped
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-this-secret-key-with-at-least-32-characters}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://todo:todo@postgres:5432/todo}"
      ACCESS_TOKEN_TTL_MINUTES: "${ACCESS_TOKEN_TTL_MINUTES:-15}"
      REFRESH_TOKEN_TTL_DAYS: "${REFRESH_TOKEN_TTL_DAYS:-7}"
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:8081","http://localhost:5173"]}'
      MEDIA_ROOT: "${MEDIA_ROOT:-/app/media}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
      ADMIN_EMAILS: '${ADMIN_EMAILS:-["admin@example.com"]}'
      AUTH_RATE_LIMIT: "${AUTH_RATE_LIMIT:-20/minute}"
      WRITE_RATE_LIMIT: "${WRITE_RATE_LIMIT:-80/minute}"
      READ_RATE_LIMIT: "${READ_RATE_LIMIT:-240/minute}"
      METRICS_ENABLED: "${METRICS_ENABLED:-false}"
      REFRESH_COOKIE_PATH: "${REFRESH_COOKIE_PATH:-/}"
      DOZZLE_URL: "${DOZZLE_URL:-/dozzle/}"
      PGWEB_URL: "${PGWEB_URL:-/db/}"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-1}"
    volumes:
      - backend_media:/app/media
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE:-ghcr.io/ogsupra/todo_list-web:latest}
    build:
      context: ./frontend
    container_name: todo_web
    restart: unless-stopped
    ports:
      - "8081:80"
    logging: *default-logging
    depends_on:
      - api

  # Lightweight ops tools. They are not exposed directly to the internet:
  # access only goes through nginx at /dozzle/ and /db/ after admin auth.
  dozzle:
    image: ghcr.io/amir20/dozzle:latest
    container_name: todo_dozzle
    restart: unless-stopped
    environment:
      DOZZLE_BASE: /dozzle
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_ENABLE_ACTIONS: "false"
      DOZZLE_ENABLE_SHELL: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dozzle_data:/data
    logging: *default-logging

  pgweb:
    image: ghcr.io/sosedoff/pgweb:latest
    container_name: todo_pgweb
    restart: unless-stopped
    command:
      - "--bind=0.0.0.0"
      - "--listen=8081"
      - "--url=postgresql://${POSTGRES_USER:-todo}:${POSTGRES_PASSWORD:-todo}@postgres:5432/${POSTGRES_DB:-todo}?sslmode=disable"
      - "--prefix=/db"
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  # Monitoring is kept behind a profile so a weak VPS can run only the app stack.
  # Enable later with:
  # docker compose --profile monitoring up -d prometheus grafana loki promtail postgres-exporter cadvisor node-exporter
  # For this tiny VPS Dozzle already covers day-to-day log viewing more cheaply.
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: todo_prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    logging: *default-logging
    depends_on:
      - api
      - postgres-exporter
      - cadvisor
      - node-exporter

  grafana:
    image: grafana/grafana:11.1.4
    container_name: todo_grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    logging: *default-logging
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.1.1
    container_name: todo_loki
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    logging: *default-logging

  promtail:
    image: grafana/promtail:3.1.1
    container_name: todo_promtail
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    logging: *default-logging
    depends_on:
      - loki

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    container_name: todo_postgres_exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-todo}:${POSTGRES_PASSWORD:-todo}@postgres:5432/${POSTGRES_DB:-todo}?sslmode=disable"
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: todo_cadvisor
    restart: unless-stopped
    profiles: ["monitoring"]
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    logging: *default-logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: todo_node_exporter
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    logging: *default-logging

volumes:
  postgres_data:
  backend_media:
  dozzle_data:
  prometheus_data:
  grafana_data:
  loki_data:
