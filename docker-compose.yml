services:
  flask:
    build: .
    container_name: todo_flask_app
    restart: unless-stopped
    volumes:
      - ./instance:/app/instance
      - ./static/images:/app/static/images
      - ./logs:/var/log
      - ./backend:/app/backend
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=your-secret-key-change-in-production-12345
      - PYTHONPATH=/app/backend
    working_dir: /app/backend
    command: gunicorn -w 4 -b 0.0.0.0:5000 app:app

  nginx:
    image: nginx:alpine
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
      - "8978:8978"   # Защищенная админка
      - "61208:61208" # Защищенный мониторинг
    volumes:
      # Пробрасываем файл с паролями внутрь Nginx
      - /root/todo-app/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro  # Изменено
    depends_on:
      - flask

  sqlite-admin:
    image: coleifer/sqlite-web:latest
    container_name: todo-sqlite-web
    volumes:
      # Пробрасываем папку с базой данных вашего приложения
      - ./backend/instance:/data
    environment:
      # Указываем точное имя файла базы данных внутри папки /data
      - SQLITE_DATABASE=todo.db
    restart: unless-stopped

  monitoring:
    image: amir20/dozzle:latest
    container_name: todo-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
