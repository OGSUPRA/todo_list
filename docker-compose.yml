services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todo}
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo} -d ${POSTGRES_DB:-todo}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
    container_name: todo_api
    restart: unless-stopped
    environment:
      SECRET_KEY: "${SECRET_KEY:-change-this-secret-key-with-at-least-32-characters}"
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://todo:todo@postgres:5432/todo}"
      ACCESS_TOKEN_TTL_MINUTES: "${ACCESS_TOKEN_TTL_MINUTES:-15}"
      REFRESH_TOKEN_TTL_DAYS: "${REFRESH_TOKEN_TTL_DAYS:-7}"
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:8081","http://localhost:5173"]}'
      MEDIA_ROOT: "${MEDIA_ROOT:-/app/media}"
      SECURE_COOKIES: "${SECURE_COOKIES:-false}"
    volumes:
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./frontend
    container_name: todo_web
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4:8.10
    container_name: todo_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
  backend_media:
